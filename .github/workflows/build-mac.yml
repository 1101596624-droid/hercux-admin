name: Build macOS

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Compile Electron
        run: npm run electron:compile

      - name: Build macOS app
        run: npx electron-builder --mac dmg zip --publish never

      - name: Create Release and Upload
        uses: softprops/action-gh-release@v2
        with:
          tag_name: mac-build-${{ github.run_number }}
          name: macOS Build ${{ github.run_number }}
          files: |
            dist-electron-app/*.dmg
            dist-electron-app/*.zip
