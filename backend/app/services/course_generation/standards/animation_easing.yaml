[{"text": "# HERCU 动画缓动函数库\n# 版本: 1.0.0\n# 更新: 2026-02-10\n\nversion: \"1.0.0\"\n\n# 8种基础缓动函数\neasing_functions:\n  # ==== 1. Linear (线性) ====\n  - id: \"linear\"\n    name: \"线性\"\n    difficulty: \"简单\"\n    description: \"匀速运动,无加速度\"\n    formula: \"f(t) = t\"\n    use_cases:\n      - \"等速移动\"\n      - \"匀速旋转\"\n      - \"简单动画\"\n    characteristics:\n      speed: \"恒定\"\n      acceleration: \"0\"\n      feeling: \"机械感、平淡\"\n\n    implementation:\n      javascript: |\n        function linear(t) {\n          return t;\n        }\n\n      usage_example: |\n        const t = (ctx.getTime() % 2000) / 2000;  // 0-1\n        const progress = linear(t);\n        const x = ctx.math.lerp(startX, endX, progress);\n\n    visualization_code: |\n      // 线性运动演示\n      const t = (ctx.getTime() % 3000) / 3000;\n      const x = width * 0.1 + t * width * 0.8;\n      const ball = ctx.createCircle(x, height * 0.5, 15, '#6B7280', 0);\n\n  # ==== 2. Ease In (加速) ====\n  - id: \"ease_in\"\n    name: \"加速进入\"\n    difficulty: \"简单\"\n    description: \"缓慢开始,逐渐加速\"\n    formula: \"f(t) = t²\"\n    use_cases:\n      - \"物体下落\"\n      - \"淡入效果\"\n      - \"元素收缩\"\n    characteristics:\n      speed: \"慢 → 快\"\n      acceleration: \"正加速度\"\n      feeling: \"加速感、积累力量\"\n\n    implementation:\n      javascript: |\n        function easeIn(t) {\n          return t * t;\n        }\n\n      usage_example: |\n        const t = (ctx.getTime() % 2000) / 2000;\n        const progress = easeIn(t);\n        const alpha = progress;  // 淡入效果\n        ctx.setAlpha(element, alpha);\n\n    visualization_code: |\n      // 加速运动演示\n      const t = (ctx.getTime() % 3000) / 3000;\n      const progress = t * t;  // easeIn\n      const x = width * 0.1 + progress * width * 0.8;\n      const ball = ctx.createCircle(x, height * 0.5, 15, '#3B82F6', 0);\n\n  # ==== 3. Ease Out (减速) ====\n  - id: \"ease_out\"\n    name: \"减速退出\"\n    difficulty: \"简单\"\n    description: \"快速开始,逐渐减速\"\n    formula: \"f(t) = 1 - (1-t)²\"\n    use_cases:\n      - \"元素停靠\"\n      - \"弹跳落地\"\n      - \"淡出效果\"\n    characteristics:\n      speed: \"快 → 慢\"\n      acceleration: \"负加速度\"\n      feeling: \"缓冲感、柔和停止\"\n\n    implementation:\n      javascript: |\n        function easeOut(t) {\n          return 1 - Math.pow(1 - t, 2);\n        }\n\n      usage_example: |\n        const t = (ctx.getTime() % 2000) / 2000;\n        const progress = easeOut(t);\n        const y = startY + (endY - startY) * progress;\n\n    visualization_code: |\n      // 减速运动演示\n      const t = (ctx.getTime() % 3000) / 3000;\n      const progress = 1 - Math.pow(1 - t, 2);  // easeOut\n      const x = width * 0.1 + progress * width * 0.8;\n      const ball = ctx.createCircle(x, height * 0.5, 15, '#10B981', 0);\n\n  # ==== 4. Ease In-Out (加减速) ====\n  - id: \"ease_in_out\"\n    name: \"加减速\"\n    difficulty: \"简单\"\n    description: \"缓慢开始,中间加速,缓慢结束\"\n    formula: \"f(t) = t < 0.5 ? 2t² : 1 - 2(1-t)²\"\n    use_cases:\n      - \"页面切换\"\n      - \"平滑过渡\"\n      - \"往返运动\"\n    characteristics:\n      speed: \"慢 → 快 → 慢\"\n      acceleration: \"先正后负\"\n      feeling: \"自然感、流畅\"\n\n    implementation:\n      javascript: |\n        function easeInOut(t) {\n          return t < 0.5 \n            ? 2 * t * t \n            : 1 - Math.pow(-2 * t + 2, 2) / 2;\n        }\n\n      usage_example: |\n        const t = (ctx.getTime() % 2000) / 2000;\n        const progress = easeInOut(t);\n        const scale = 1 + progress * 0.5;\n        ctx.setScale(element, scale);\n\n    visualization_code: |\n      // 加减速运动演示\n      const t = (ctx.getTime() % 3000) / 3000;\n      const progress = t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2, 2)/2;\n      const x = width * 0.1 + progress * width * 0.8;\n      const ball = ctx.createCircle(x, height * 0.5, 15, '#8B5CF6', 0);\n\n  # ==== 5. Ease Out Back (回弹) ====\n  - id: \"ease_out_back\"\n    name: \"回弹退出\"\n    difficulty: \"中等\"\n    description: \"超过目标后回弹\"\n    formula: \"f(t) = 1 + c3 * (t-1)³ + c1 * (t-1)²\"\n    parameters:\n      c1: 1.70158\n      c3: \"c1 + 1\"\n    use_cases:\n      - \"按钮点击反馈\"\n      - \"弹性效果\"\n      - \"强调动画\"\n    characteristics:\n      speed: \"快速超调后回弹\"\n      acceleration: \"非线性\"\n      feeling: \"弹性感、活泼\"\n\n    implementation:\n      javascript: |\n        function easeOutBack(t) {\n          const c1 = 1.70158;\n          const c3 = c1 + 1;\n          return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);\n        }\n\n      usage_example: |\n        const t = (ctx.getTime() % 1500) / 1500;\n        const progress = easeOutBack(t);\n        const scale = 1 + progress * 0.3;\n        ctx.setScale(button, scale);\n\n    visualization_code: |\n      // 回弹动画演示\n      function easeOutBack(t) {\n        const c1 = 1.70158;\n        const c3 = c1 + 1;\n        return 1 + c3 * Math.pow(t-1, 3) + c1 * Math.pow(t-1, 2);\n      }\n\n      const t = (ctx.getTime() % 2000) / 2000;\n      const progress = easeOutBack(t);\n      const x = width * 0.1 + progress * width * 0.8;\n      const clampedX = ctx.math.clamp(x, width*0.1, width*0.9);\n      const ball = ctx.createCircle(clampedX, height * 0.5, 18, '#EC4899', 0);\n      ctx.setGlow(ball, {color: '#EC4899', blur: 12});\n\n  # ==== 6. Ease Out Bounce (弹跳) ====\n  - id: \"ease_out_bounce\"\n    name: \"弹跳退出\"\n    difficulty: \"复杂\"\n    description: \"多次小幅度弹跳后停止\"\n    formula: \"分段函数,模拟重力弹跳\"\n    use_cases:\n      - \"球体落地\"\n      - \"元素掉落\"\n      - \"物理模拟\"\n    characteristics:\n      speed: \"多次减幅振动\"\n      acceleration: \"重力加速度\"\n      feeling: \"物理真实感\"\n\n    implementation:\n      javascript: |\n        function easeOutBounce(t) {\n          const n1 = 7.5625;\n          const d1 = 2.75;\n\n          if (t < 1 / d1) {\n            return n1 * t * t;\n          } else if (t < 2 / d1) {\n            return n1 * (t -= 1.5 / d1) * t + 0.75;\n          } else if (t < 2.5 / d1) {\n            return n1 * (t -= 2.25 / d1) * t + 0.9375;\n          } else {\n            return n1 * (t -= 2.625 / d1) * t + 0.984375;\n          }\n        }\n\n      usage_example: |\n        const t = (ctx.getTime() % 2000) / 2000;\n        const progress = easeOutBounce(t);\n        const y = startY + (endY - startY) * progress;\n\n    visualization_code: |\n      // 弹跳动画演示\n      function easeOutBounce(t) {\n        const n1 = 7.5625, d1 = 2.75;\n        if (t < 1/d1) return n1 * t * t;\n        if (t < 2/d1) return n1 * (t-=1.5/d1) * t + 0.75;\n        if (t < 2.5/d1) return n1 * (t-=2.25/d1) * t + 0.9375;\n        return n1 * (t-=2.625/d1) * t + 0.984375;\n      }\n\n      const t = (ctx.getTime() % 3000) / 3000;\n      const progress = easeOutBounce(t);\n      const y = height * 0.2 + progress * (height * 0.6);\n      const ball = ctx.createCircle(width * 0.5, y, 20, '#F59E0B', 0);\n\n  # ==== 7. Ease In-Out Elastic (弹性) ====\n  - id: \"ease_in_out_elastic\"\n    name: \"弹性往复\"\n    difficulty: \"复杂\"\n    description: \"类似弹簧震荡\"\n    formula: \"正弦波衰减函数\"\n    use_cases:\n      - \"弹簧效果\"\n      - \"震动反馈\"\n      - \"强调特效\"\n    characteristics:\n      speed: \"震荡衰减\"\n      acceleration: \"周期性变化\"\n      feeling: \"弹性感、夸张\"\n\n    implementation:\n      javascript: |\n        function easeInOutElastic(t) {\n          const c5 = (2 * Math.PI) / 4.5;\n\n          if (t === 0) return 0;\n          if (t === 1) return 1;\n\n          if (t < 0.5) {\n            return -(Math.pow(2, 20 * t - 10) * Math.sin((20 * t - 11.125) * c5)) / 2;\n          } else {\n            return (Math.pow(2, -20 * t + 10) * Math.sin((20 * t - 11.125) * c5)) / 2 + 1;\n          }\n        }\n\n      usage_example: |\n        const t = (ctx.getTime() % 2000) / 2000;\n        const progress = easeInOutElastic(t);\n        const scale = 1 + progress * 0.5;\n        ctx.setScale(element, scale);\n\n    visualization_code: |\n      // 弹性动画演示\n      function easeInOutElastic(t) {\n        const c5 = (2 * Math.PI) / 4.5;\n        if (t === 0) return 0;\n        if (t === 1) return 1;\n        if (t < 0.5) {\n          return -(Math.pow(2, 20*t-10) * Math.sin((20*t-11.125)*c5)) / 2;\n        }\n        return (Math.pow(2, -20*t+10) * Math.sin((20*t-11.125)*c5)) / 2 + 1;\n      }\n\n      const t = (ctx.getTime() % 2500) / 2500;\n      const progress = easeInOutElastic(t);\n      const scale = 1 + progress * 0.3;\n      const ball = ctx.createCircle(width * 0.5, height * 0.5, 25, '#DC2626', 0);\n      ctx.setScale(ball, scale);\n\n  # ==== 8. Ease Out Expo (指数衰减) ====\n  - id: \"ease_out_expo\"\n    name: \"指数衰减\"\n    difficulty: \"简单\"\n    description: \"快速接近目标值,越来越慢\"\n    formula: \"f(t) = 1 - 2^(-10t)\"\n    use_cases:\n      - \"数值收敛\"\n      - \"渐进停止\"\n      - \"物理阻尼\"\n    characteristics:\n      speed: \"极快 → 渐慢\"\n      acceleration: \"指数衰减\"\n      feeling: \"急停感、精确\"\n\n    implementation:\n      javascript: |\n        function easeOutExpo(t) {\n          return t === 1 ? 1 : 1 - Math.pow(2, -10 * t);\n        }\n\n      usage_example: |\n        const t = (ctx.getTime() % 2000) / 2000;\n        const progress = easeOutExpo(t);\n        const value = startValue + (targetValue - startValue) * progress;\n\n    visualization_code: |\n      // 指数衰减动画演示\n      function easeOutExpo(t) {\n        return t === 1 ? 1 : 1 - Math.pow(2, -10 * t);\n      }\n\n      const t = (ctx.getTime() % 2000) / 2000;\n      const progress = easeOutExpo(t);\n      const x = width * 0.1 + progress * width * 0.8;\n      const ball = ctx.createCircle(x, height * 0.5, 15, '#22C55E', 0);\n\n# 物理感动画公式\nphysics_based_animations:\n  # ==== 重力加速度 ====\n  - name: \"重力下落\"\n    description: \"模拟自由落体运动\"\n    formula: \"y = y0 + 0.5 * g * t²\"\n    parameters:\n      g: 9.8  # 重力加速度 (m/s²)\n      y0: \"起始高度\"\n      t: \"时间 (秒)\"\n\n    implementation: |\n      const g = ctx.getVar('gravity');  // 可调节重力\n      const t = ctx.getTime() * 0.001;   // 转换为秒\n      const startY = height * 0.2;\n      const y = startY + 0.5 * g * t * t * 100;  // 乘100放大效果\n      const clampedY = ctx.math.clamp(y, height * 0.2, height * 0.8);\n\n      const ball = ctx.createCircle(width * 0.5, clampedY, 20, '#3B82F6', 0);\n\n    use_cases:\n      - \"物体下落\"\n      - \"抛体运动\"\n      - \"跳跃动画\"\n\n  # ==== 简谐振动 ====\n  - name: \"简谐振动\"\n    description: \"弹簧振子运动\"\n    formula: \"x = A * sin(ωt + φ)\"\n    parameters:\n      A: \"振幅\"\n      ω: \"角频率\"\n      φ: \"初相位\"\n      t: \"时间\"\n\n    implementation: |\n      const amplitude = ctx.getVar('amplitude');\n      const frequency = ctx.getVar('frequency');\n      const t = ctx.getTime() * 0.001;\n\n      const x = width * 0.5 + amplitude * Math.sin(frequency * t) * 100;\n      const clampedX = ctx.math.clamp(x, width * 0.1, width * 0.9);\n\n      const ball = ctx.createCircle(clampedX, height * 0.5, 20, '#10B981', 0);\n\n    use_cases:\n      - \"弹簧振动\"\n      - \"摆动\"\n      - \"周期运动\"\n\n  # ==== 阻尼振动 ====\n  - name: \"阻尼振动\"\n    description: \"带阻尼的振动,逐渐衰减\"\n    formula: \"x = A * e^(-bt) * sin(ωt)\"\n    parameters:\n      A: \"初始振幅\"\n      b: \"阻尼系数\"\n      ω: \"角频率\"\n      t: \"时间\"\n\n    implementation: |\n      const amplitude = 100;\n      const damping = 0.5;       // 阻尼系数\n      const frequency = 3;        // 角频率\n      const t = ctx.getTime() * 0.001;\n\n      const decay = Math.exp(-damping * t);  // 指数衰减\n      const x = width * 0.5 + amplitude * decay * Math.sin(frequency * t);\n      const clampedX = ctx.math.clamp(x, width * 0.1, width * 0.9);\n\n      const ball = ctx.createCircle(clampedX, height * 0.5, 20, '#F59E0B', 0);\n\n      // 显示当前振幅\n      const currentAmp = amplitude * decay;\n      const label = ctx.createText(\n        `振幅: ${currentAmp.toFixed(1)}`,\n        width * 0.5, height * 0.3,\n        {fontSize: 14, color: '#6B7280', align: 'center'}\n      );\n\n    use_cases:\n      - \"减震效果\"\n      - \"自然停止\"\n      - \"真实物理\"\n\n  # ==== 摆动 ====\n  - name: \"单摆运动\"\n    description: \"模拟单摆的周期运动\"\n    formula: \"θ = θ0 * cos(√(g/L) * t)\"\n    parameters:\n      θ0: \"初始角度\"\n      g: \"重力加速度\"\n      L: \"摆长\"\n      t: \"时间\"\n\n    implementation: |\n      const angle0 = Math.PI / 6;  // 初始角度 30度\n      const length = 150;           // 摆长\n      const g = 9.8;\n      const t = ctx.getTime() * 0.001;\n\n      const omega = Math.sqrt(g / length);\n      const angle = angle0 * Math.cos(omega * t);\n\n      // 摆的固定点\n      const pivotX = width * 0.5;\n      const pivotY = height * 0.2;\n\n      // 摆球位置\n      const ballX = pivotX + length * Math.sin(angle);\n      const ballY = pivotY + length * Math.cos(angle);\n\n      // 绘制摆绳\n      const rope = ctx.createLine(pivotX, pivotY, ballX, ballY, '#6B7280', 2);\n\n      // 绘制摆球\n      const ball = ctx.createCircle(ballX, ballY, 20, '#DC2626', 0);\n      ctx.setGlow(ball, {color: '#DC2626', blur: 10});\n\n    use_cases:\n      - \"钟摆\"\n      - \"秋千\"\n      - \"周期演示\"\n\n# 缓动函数选择指南\nselection_guide:\n  scenarios:\n    - scenario: \"元素进入\"\n      recommended: [\"ease_out\", \"ease_out_back\"]\n      reason: \"柔和停靠,吸引注意\"\n\n    - scenario: \"元素退出\"\n      recommended: [\"ease_in\", \"ease_out_expo\"]\n      reason: \"快速消失,不占用时间\"\n\n    - scenario: \"位置变换\"\n      recommended: [\"ease_in_out\", \"ease_out\"]\n      reason: \"自然流畅\"\n\n    - scenario: \"大小变化\"\n      recommended: [\"ease_out_back\", \"ease_in_out_elastic\"]\n      reason: \"弹性感,强调变化\"\n\n    - scenario: \"颜色过渡\"\n      recommended: [\"ease_in_out\", \"linear\"]\n      reason: \"平滑渐变\"\n\n    - scenario: \"旋转动画\"\n      recommended: [\"ease_out\", \"ease_in_out\"]\n      reason: \"防止眩晕\"\n\n    - scenario: \"物理模拟\"\n      recommended: [\"ease_out_bounce\", \"physics_based\"]\n      reason: \"真实感\"\n\n    - scenario: \"强调效果\"\n      recommended: [\"ease_out_back\", \"ease_in_out_elastic\"]\n      reason: \"夸张,吸引注意\"\n\n# 缓动函数对比\ncomparison:\n  speed_comparison:\n    fastest: [\"ease_out_expo\", \"ease_in\"]\n    moderate: [\"ease_in_out\", \"ease_out\"]\n    slowest: [\"linear\", \"ease_in_out_elastic\"]\n\n  smoothness:\n    smoothest: [\"ease_in_out\", \"ease_out\"]\n    moderate: [\"ease_out_back\", \"linear\"]\n    jittery: [\"ease_out_bounce\", \"ease_in_out_elastic\"]\n\n  attention_grabbing:\n    high: [\"ease_out_back\", \"ease_in_out_elastic\", \"ease_out_bounce\"]\n    medium: [\"ease_in\", \"ease_out\"]\n    low: [\"linear\", \"ease_in_out\"]\n\n# 组合使用策略\ncombination_strategies:\n  - strategy: \"多阶段动画\"\n    description: \"不同阶段使用不同缓动\"\n    example: |\n      const t = ctx.getTime() * 0.001;\n      let progress;\n\n      if (t < 1) {\n        // 第一阶段:加速进入\n        progress = easeIn(t);\n      } else if (t < 2) {\n        // 第二阶段:匀速运动\n        progress = 1 + linear(t - 1);\n      } else {\n        // 第三阶段:弹性退出\n        progress = 2 + easeOutBack((t - 2) / 1);\n      }\n\n  - strategy: \"独立属性动画\"\n    description: \"不同属性使用不同缓动\"\n    example: |\n      const t = (ctx.getTime() % 2000) / 2000;\n\n      // 位置使用easeInOut\n      const x = width * 0.1 + easeInOut(t) * width * 0.8;\n\n      // 大小使用easeOutBack\n      const scale = 1 + easeOutBack(t) * 0.5;\n\n      // 透明度使用linear\n      const alpha = t;\n\n      const element = ctx.createCircle(x, height * 0.5, 20, '#3B82F6', 0);\n      ctx.setScale(element, scale);\n      ctx.setAlpha(element, alpha);\n\n# 性能优化建议\nperformance_tips:\n  - tip: \"预计算缓动表\"\n    description: \"对于复杂缓动,可以预计算成查找表\"\n    benefit: \"提升运行时性能\"\n\n  - tip: \"避免过度使用弹性\"\n    description: \"elastic和bounce计算量大,谨慎使用\"\n    recommendation: \"每帧最多3-5个弹性动画\"\n\n  - tip: \"使用requestAnimationFrame\"\n    description: \"CustomRenderer已自动优化,无需手动处理\"\n\n  - tip: \"限制动画时长\"\n    description: \"单个动画建议0.3-1秒\"\n    reason: \"太长影响体验,太短看不清\"\n\n# 常见错误\ncommon_mistakes:\n  - mistake: \"时间参数未归一化\"\n    wrong: |\n      const t = ctx.getTime();  // 直接使用毫秒\n      const progress = easeIn(t);\n    correct: |\n      const t = (ctx.getTime() % 2000) / 2000;  // 归一化到 0-1\n      const progress = easeIn(t);\n    reason: \"缓动函数期望输入0-1\"\n\n  - mistake: \"未使用clamp限制\"\n    wrong: |\n      const x = startX + easeOutBack(t) * distance;  // 可能超出边界\n    correct: |\n      const rawX = startX + easeOutBack(t) * distance;\n      const x = ctx.math.clamp(rawX, width*0.1, width*0.9);\n    reason: \"回弹动画可能超出范围\"\n\n  - mistake: \"动画速度过快\"\n    wrong: |\n      const t = (ctx.getTime() % 500) / 500;  // 0.5秒循环\n    correct: |\n      const t = (ctx.getTime() % 2000) / 2000;  // 2秒循环\n    reason: \"太快看不清细节\"\n\n# 实用代码片段\ncode_snippets:\n  pulse_animation: |\n    // 脉动动画\n    const t = (ctx.getTime() * 0.002) % 1;\n    const scale = 1 + Math.sin(t * Math.PI * 2) * 0.15;\n    ctx.setScale(element, scale);\n\n  fade_in_out: |\n    // 淡入淡出\n    const t = (ctx.getTime() * 0.001) % 2;\n    const alpha = t < 1 ? t : 2 - t;  // 0→1→0\n    ctx.setAlpha(element, alpha);\n\n  smooth_follow: |\n    // 平滑跟随\n    const targetX = ctx.getVar('targetPosition') * width;\n    const currentX = /* 当前位置 */;\n    const smoothX = ctx.math.lerp(currentX, targetX, 0.1);  // 10%插值\n\n  oscillate: |\n    // 振荡效果\n    const t = ctx.getTime() * 0.002;\n    const x = width * 0.5 + Math.sin(t * Math.PI * 2) * 100;\n\n  exponential_approach: |\n    // 指数逼近目标\n    const target = ctx.getVar('target');\n    const current = /* 当前值 */;\n    const newValue = current + (target - current) * 0.1;  // 每帧接近10%\n\n# 调试工具\ndebugging_tools:\n  visualize_easing: |\n    // 可视化缓动曲线\n    function drawEasingCurve(easingFunc, color) {\n      const points = [];\n      for (let i = 0; i <= 100; i++) {\n        const t = i / 100;\n        const progress = easingFunc(t);\n        const x = width * 0.1 + t * width * 0.8;\n        const y = height * 0.8 - progress * height * 0.6;\n        points.push([x, y]);\n      }\n      ctx.createCurve(points, color, 2);\n    }\n\n    // 绘制多条曲线对比\n    drawEasingCurve(linear, '#6B7280');\n    drawEasingCurve(easeIn, '#3B82F6');\n    drawEasingCurve(easeOut, '#10B981');\n\n  compare_side_by_side: |\n    // 并排对比不同缓动\n    const t = (ctx.getTime() % 2000) / 2000;\n    const easings = [\n      {func: linear, color: '#6B7280', y: 0.3},\n      {func: easeIn, color: '#3B82F6', y: 0.5},\n      {func: easeOut, color: '#10B981', y: 0.7}\n    ];\n\n    easings.forEach(easing => {\n      const progress = easing.func(t);\n      const x = width * 0.1 + progress * width * 0.8;\n      const ball = ctx.createCircle(x, height * easing.y, 15, easing.color, 0);\n    });\n\n# 缓动函数速查表\nquick_reference:\n  import_all: |\n    // 导入所有缓动函数\n    const Easing = {\n      linear: (t) => t,\n      easeIn: (t) => t * t,\n      easeOut: (t) => 1 - Math.pow(1 - t, 2),\n      easeInOut: (t) => t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2, 2)/2,\n      easeOutBack: (t) => {\n        const c1 = 1.70158, c3 = c1 + 1;\n        return 1 + c3 * Math.pow(t-1, 3) + c1 * Math.pow(t-1, 2);\n      },\n      easeOutBounce: (t) => {\n        const n1 = 7.5625, d1 = 2.75;\n        if (t < 1/d1) return n1 * t * t;\n        if (t < 2/d1) return n1 * (t-=1.5/d1) * t + 0.75;\n        if (t < 2.5/d1) return n1 * (t-=2.25/d1) * t + 0.9375;\n        return n1 * (t-=2.625/d1) * t + 0.984375;\n      },\n      easeInOutElastic: (t) => {\n        const c5 = (2 * Math.PI) / 4.5;\n        if (t === 0) return 0;\n        if (t === 1) return 1;\n        if (t < 0.5) {\n          return -(Math.pow(2, 20*t-10) * Math.sin((20*t-11.125)*c5)) / 2;\n        }\n        return (Math.pow(2, -20*t+10) * Math.sin((20*t-11.125)*c5)) / 2 + 1;\n      },\n      easeOutExpo: (t) => t === 1 ? 1 : 1 - Math.pow(2, -10 * t)\n    };\n\n  usage: |\n    // 使用示例\n    const t = (ctx.getTime() % 2000) / 2000;\n    const progress = Easing.easeOutBack(t);\n    const x = width * 0.1 + progress * width * 0.8;\n", "type": "text"}]