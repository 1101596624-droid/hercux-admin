# HERCU 画布配置
# 版本: 1.0.0
# 更新: 2026-02-10

version: "v3"

# 两端画布尺寸
canvas_sizes:
  # 学生端（学习工作站）
  student:
    width: 1600
    height: 900
    target: "hercux"
    usage: "学生学习时的主画布"
    file: "hercux/components/simulator-engine/CustomRenderer.tsx"

  # 管理端（编辑器预览）
  admin:
    width: 1600
    height: 900
    target: "hercux-admin"
    usage: "管理员编辑时的预览画布"
    file: "hercux-admin/components/simulator-engine/CustomRenderer.tsx"

# AI生成目标
generation_target:
  default: "student"            # 默认针对学生端生成
  reason: "学生端是主要使用场景，管理端只是预览"

  responsive_strategy: "使用比例坐标（width * 0.5）而非绝对像素"

# 安全绘制区域（学生端 1000x650）
safe_area_student:
  x_min: 100                    # 左侧留给滑块控制区 (0-80px)
  x_max: 950                    # 右侧留 50px 边距
  y_min: 60                     # 顶部留出标题区域
  y_max: 620                    # 底部留 30px 边距

  main_content_area:
    x: [100, 950]
    y: [60, 600]
    description: "主要内容放置区域"

# 安全绘制区域（管理端 800x500）
safe_area_admin:
  x_min: 80                     # 左侧留给滑块控制区 (0-60px)
  x_max: 760                    # 右侧留 40px 边距
  y_min: 50                     # 顶部留出标题区域
  y_max: 470                    # 底部留 30px 边距

  main_content_area:
    x: [80, 760]
    y: [50, 450]
    description: "主要内容放置区域"

# 比例坐标系统
proportional_coordinates:
  enabled: true
  formula: "actualX = canvasWidth * proportionX"

  examples:
    - code: "const centerX = width * 0.5"
      description: "画布中心X"

    - code: "const leftMargin = width * 0.1"
      description: "左侧边距 10%"

    - code: "const safeX = ctx.math.clamp(x, width*0.1, width*0.95)"
      description: "限制在安全区域"

  benefits:
    - "自动适配两端不同尺寸"
    - "代码可移植性强"
    - "视觉比例协调"

# 布局区域划分
layout_zones:
  title_zone:
    position: "top"
    height: 50
    usage: "标题和说明文字"

  main_visualization_zone:
    position: "center"
    area: "60% of canvas"
    usage: "主要可视化元素"

  control_zone:
    position: "left"
    width: 80                   # 学生端 100px, 管理端 80px
    usage: "变量滑块控制区"

  state_panel_zone:
    position: "top-right or bottom-right"
    usage: "数值显示面板"

  legend_zone:
    position: "bottom or right"
    usage: "图例说明"

# 响应式设计原则
responsive_principles:
  - rule: "使用 width/height 比例而非绝对像素"
    example: "x = width * 0.5 (而非 x = 500)"

  - rule: "动态坐标必须使用 clamp 限制"
    example: "x = ctx.math.clamp(x, width*0.1, width*0.95)"

  - rule: "文字大小可根据画布调整"
    example: "fontSize = Math.max(12, width * 0.02)"

  - rule: "元素间距使用比例"
    example: "spacing = width * 0.02"

# 常见错误
common_mistakes:
  - mistake: "硬编码坐标 x = 500"
    fix: "使用比例 x = width * 0.5"
    reason: "管理端宽度只有800，500已超过中心"

  - mistake: "元素超出画布边界"
    fix: "使用 ctx.math.clamp() 限制范围"

  - mistake: "左侧文字被滑块遮挡"
    fix: "文字 x >= width * 0.1"

# 调试工具
debug_helpers:
  draw_safe_area:
    enabled: false              # 开发时可启用
    code: |
      // 绘制安全区域边界（调试用）
      const boundary = ctx.createRect(
        width * 0.1, 60,
        width * 0.85, height - 100,
        'rgba(255,0,0,0.1)',
        0
      );

  show_coordinates:
    enabled: false
    code: |
      // 显示当前坐标（调试用）
      const coords = ctx.createText(
        `${width} x ${height}`,
        width * 0.5, 30,
        {fontSize: 12, color: '#999'}
      );
