[{"text": "# HERCU CustomRenderer API \u5b8c\u6574\u6587\u6863\n# \u7248\u672c: 1.0.0\n# \u66f4\u65b0: 2026-02-10\n\nversion: \"1.0.0\"\n\n# CustomRenderer API \u5b8c\u6574\u53c2\u8003\napi_reference:\n  # ==== \u57fa\u7840 API ====\n  basic:\n    - name: \"ctx.getTime\"\n      category: \"\u65f6\u95f4\u548c\u72b6\u6001\"\n      signature: \"ctx.getTime(): number\"\n      description: \"\u83b7\u53d6\u5f53\u524d\u65f6\u95f4\u6233\uff08\u6beb\u79d2\uff09\uff0c\u7528\u4e8e\u52a8\u753b\"\n      returns: \"\u8fd4\u56de\u4ece\u7a0b\u5e8f\u542f\u52a8\u5230\u73b0\u5728\u7684\u6beb\u79d2\u6570\"\n      example: |\n        const t = ctx.getTime() * 0.001;  // \u8f6c\u6362\u4e3a\u79d2\n        const x = width * 0.5 + Math.sin(t) * 100;\n      use_cases:\n        - \"\u5468\u671f\u6027\u52a8\u753b\"\n        - \"\u65f6\u95f4\u76f8\u5173\u6548\u679c\"\n        - \"\u81ea\u52a8\u64ad\u653e\"\n      notes:\n        - \"\u5efa\u8bae\u4e58\u4ee5 0.001 \u8f6c\u6362\u4e3a\u79d2\"\n        - \"\u53ef\u7528 % \u8fd0\u7b97\u7b26\u5b9e\u73b0\u5faa\u73af\uff1a t % 3000\"\n\n    - name: \"ctx.getVar\"\n      category: \"\u53d8\u91cf\u8bbf\u95ee\"\n      signature: \"ctx.getVar(name: string): number\"\n      description: \"\u83b7\u53d6\u6ed1\u5757\u53d8\u91cf\u7684\u5f53\u524d\u503c\"\n      parameters:\n        - name: \"name\"\n          type: \"string\"\n          description: \"\u53d8\u91cf\u540d\u79f0\uff08\u5fc5\u987b\u5728 setup \u4e2d\u5b9a\u4e49\uff09\"\n      returns: \"\u53d8\u91cf\u7684\u5f53\u524d\u6570\u503c\"\n      example: |\n        // \u5728 setup \u4e2d\u5b9a\u4e49\n        ctx.addVariable('mass', 5, 1, 10);\n\n        // \u5728 update \u4e2d\u4f7f\u7528\n        const mass = ctx.getVar('mass');\n        const radius = mass * 10;\n      use_cases:\n        - \"\u83b7\u53d6\u7528\u6237\u8f93\u5165\"\n        - \"\u6839\u636e\u53d8\u91cf\u8c03\u6574\u89c6\u89c9\"\n        - \"\u8ba1\u7b97\u4f9d\u8d56\u53c2\u6570\"\n      important: \"\u53d8\u91cf\u5fc5\u987b\u5f71\u54cd\u89c6\u89c9\uff0c\u4e0d\u80fd\u53ea\u662f\u88c5\u9970\"\n\n    - name: \"ctx.setVar\"\n      category: \"\u53d8\u91cf\u8bbf\u95ee\"\n      signature: \"ctx.setVar(name: string, value: number): void\"\n      description: \"\u8bbe\u7f6e\u53d8\u91cf\u7684\u503c\uff08\u7a0b\u5e8f\u5185\u90e8\u4f7f\u7528\uff09\"\n      parameters:\n        - name: \"name\"\n          type: \"string\"\n          description: \"\u53d8\u91cf\u540d\u79f0\"\n        - name: \"value\"\n          type: \"number\"\n          description: \"\u65b0\u7684\u6570\u503c\"\n      example: |\n        // \u81ea\u52a8\u66f4\u65b0\u53d8\u91cf\n        const time = ctx.getTime() * 0.001;\n        ctx.setVar('currentTime', time % 10);\n      use_cases:\n        - \"\u5185\u90e8\u72b6\u6001\u7ba1\u7406\"\n        - \"\u8ba1\u7b97\u7ed3\u679c\u5b58\u50a8\"\n      notes:\n        - \"\u4e0d\u5f71\u54cd\u7528\u6237\u6ed1\u5757\u63a7\u5236\"\n\n  # ==== \u5f62\u72b6\u521b\u5efa API ====\n  shapes:\n    - name: \"ctx.createCircle\"\n      category: \"\u5f62\u72b6\"\n      signature: \"ctx.createCircle(x, y, radius, fillColor, strokeWidth?, strokeColor?): ShapeId\"\n      description: \"\u521b\u5efa\u5706\u5f62\"\n      parameters:\n        - name: \"x\"\n          type: \"number\"\n          description: \"X\u5750\u6807\uff08\u63a8\u8350\u4f7f\u7528\u6bd4\u4f8b\uff1awidth * 0.5\uff09\"\n        - name: \"y\"\n          type: \"number\"\n          description: \"Y\u5750\u6807\"\n        - name: \"radius\"\n          type: \"number\"\n          description: \"\u534a\u5f84\uff08\u50cf\u7d20\uff09\"\n        - name: \"fillColor\"\n          type: \"string\"\n          description: \"\u586b\u5145\u989c\u8272\uff08#RRGGBB \u6216 transparent\uff09\"\n        - name: \"strokeWidth\"\n          type: \"number\"\n          optional: true\n          description: \"\u63cf\u8fb9\u5bbd\u5ea6\uff08\u9ed8\u8ba40\uff09\"\n        - name: \"strokeColor\"\n          type: \"string\"\n          optional: true\n          description: \"\u63cf\u8fb9\u989c\u8272\uff08\u9ed8\u8ba4#000000\uff09\"\n      returns: \"ShapeId - \u5f62\u72b6ID\uff0c\u7528\u4e8e\u540e\u7eed\u4fee\u6539\"\n      example: |\n        // \u5b9e\u5fc3\u5706\n        const ball = ctx.createCircle(\n          width * 0.5, height * 0.5,\n          30, '#3B82F6', 0\n        );\n\n        // \u5e26\u63cf\u8fb9\u7684\u7a7a\u5fc3\u5706\n        const orbit = ctx.createCircle(\n          width * 0.5, height * 0.5,\n          80, 'transparent', 2, '#6B7280'\n        );\n      use_cases:\n        - \"\u7c92\u5b50\u3001\u539f\u5b50\u3001\u884c\u661f\"\n        - \"\u8282\u70b9\u3001\u6570\u636e\u70b9\"\n        - \"\u6309\u94ae\u3001\u6307\u793a\u5668\"\n      best_practices:\n        - \"\u4f7f\u7528 transparent \u521b\u5efa\u7a7a\u5fc3\u5706\"\n        - \"\u534a\u5f84\u5efa\u8bae 8-50px\"\n        - \"\u907f\u514d\u8fc7\u5c0f\uff08<5px\uff09\u6216\u8fc7\u5927\uff08>100px\uff09\"\n\n    - name: \"ctx.createRect\"\n      category: \"\u5f62\u72b6\"\n      signature: \"ctx.createRect(x, y, width, height, fillColor, cornerRadius?, strokeWidth?, strokeColor?): ShapeId\"\n      description: \"\u521b\u5efa\u77e9\u5f62\"\n      parameters:\n        - name: \"x\"\n          type: \"number\"\n          description: \"\u5de6\u4e0aX\u5750\u6807\"\n        - name: \"y\"\n          type: \"number\"\n          description: \"\u5de6\u4e0aY\u5750\u6807\"\n        - name: \"width\"\n          type: \"number\"\n          description: \"\u5bbd\u5ea6\"\n        - name: \"height\"\n          type: \"number\"\n          description: \"\u9ad8\u5ea6\"\n        - name: \"fillColor\"\n          type: \"string\"\n          description: \"\u586b\u5145\u989c\u8272\"\n        - name: \"cornerRadius\"\n          type: \"number\"\n          optional: true\n          description: \"\u5706\u89d2\u534a\u5f84\uff08\u9ed8\u8ba40\uff0c\u5efa\u8bae4-8\uff09\"\n        - name: \"strokeWidth\"\n          type: \"number\"\n          optional: true\n          description: \"\u63cf\u8fb9\u5bbd\u5ea6\"\n        - name: \"strokeColor\"\n          type: \"string\"\n          optional: true\n          description: \"\u63cf\u8fb9\u989c\u8272\"\n      returns: \"ShapeId\"\n      example: |\n        // \u67f1\u72b6\u56fe\u67f1\n        const bar = ctx.createRect(\n          width * 0.3, height * 0.5,\n          60, 120,\n          '#10B981', 4\n        );\n\n        // \u72b6\u6001\u9762\u677f\u80cc\u666f\n        const panel = ctx.createRect(\n          width * 0.7, height * 0.1,\n          200, 80,\n          'rgba(0,0,0,0.05)', 8, 2, '#D1D5DB'\n        );\n      use_cases:\n        - \"\u67f1\u72b6\u56fe\u3001\u6761\u5f62\u56fe\"\n        - \"\u6309\u94ae\u3001\u9762\u677f\u80cc\u666f\"\n        - \"\u5bb9\u5668\u3001\u8fb9\u754c\u6846\"\n      best_practices:\n        - \"\u5fc5\u987b\u4f7f\u7528\u5706\u89d2 cornerRadius = 4-8\"\n        - \"\u907f\u514d\u76f4\u89d2\u77e9\u5f62\uff08\u89c6\u89c9\u751f\u786c\uff09\"\n\n    - name: \"ctx.createLine\"\n      category: \"\u5f62\u72b6\"\n      signature: \"ctx.createLine(x1, y1, x2, y2, color, lineWidth): ShapeId\"\n      description: \"\u521b\u5efa\u76f4\u7ebf\"\n      parameters:\n        - name: \"x1, y1\"\n          type: \"number\"\n          description: \"\u8d77\u70b9\u5750\u6807\"\n        - name: \"x2, y2\"\n          type: \"number\"\n          description: \"\u7ec8\u70b9\u5750\u6807\"\n        - name: \"color\"\n          type: \"string\"\n          description: \"\u7ebf\u6761\u989c\u8272\"\n        - name: \"lineWidth\"\n          type: \"number\"\n          description: \"\u7ebf\u5bbd\uff081-6px\uff09\"\n      returns: \"ShapeId\"\n      example: |\n        // \u5750\u6807\u8f74\n        const xAxis = ctx.createLine(\n          width * 0.1, height * 0.8,\n          width * 0.9, height * 0.8,\n          '#6B7280', 2\n        );\n\n        // \u8fde\u63a5\u7ebf\n        const connection = ctx.createLine(\n          x1, y1, x2, y2,\n          '#3B82F6', 3\n        );\n      use_cases:\n        - \"\u5750\u6807\u8f74\"\n        - \"\u8fde\u63a5\u7ebf\u3001\u5173\u7cfb\u7ebf\"\n        - \"\u529b\u77e2\u91cf\u7684\u4e3b\u4f53\"\n      notes:\n        - \"\u7bad\u5934\u9700\u8981\u7528 createPolygon \u989d\u5916\u7ed8\u5236\"\n        - \"\u865a\u7ebf\u7528\u591a\u6bb5\u77ed\u7ebf\u6a21\u62df\"\n\n    - name: \"ctx.createCurve\"\n      category: \"\u5f62\u72b6\"\n      signature: \"ctx.createCurve(points: [number, number][], color, lineWidth): ShapeId\"\n      description: \"\u521b\u5efa\u66f2\u7ebf\uff08\u901a\u8fc7\u70b9\u96c6\uff09\"\n      parameters:\n        - name: \"points\"\n          type: \"Array<[number, number]>\"\n          description: \"\u70b9\u5750\u6807\u6570\u7ec4 [[x1,y1], [x2,y2], ...]\"\n        - name: \"color\"\n          type: \"string\"\n          description: \"\u66f2\u7ebf\u989c\u8272\"\n        - name: \"lineWidth\"\n          type: \"number\"\n          description: \"\u7ebf\u5bbd\"\n      returns: \"ShapeId\"\n      example: |\n        // \u6b63\u5f26\u66f2\u7ebf\n        const points = [];\n        for (let i = 0; i <= 100; i++) {\n          const t = (i / 100) * Math.PI * 2;\n          const x = width * 0.1 + (i / 100) * width * 0.8;\n          const y = height * 0.5 + Math.sin(t) * 80;\n          points.push([x, y]);\n        }\n        const curve = ctx.createCurve(points, '#1E40AF', 3);\n      use_cases:\n        - \"\u51fd\u6570\u56fe\u50cf\"\n        - \"\u8fd0\u52a8\u8f68\u8ff9\"\n        - \"\u6ce2\u5f62\u3001\u632f\u52a8\"\n      best_practices:\n        - \"\u81f3\u5c1130\u4e2a\u70b9\u4fdd\u8bc1\u5e73\u6ed1\"\n        - \"\u590d\u6742\u66f2\u7ebf\u5efa\u8bae 50-100 \u4e2a\u70b9\"\n        - \"\u53ef\u7528 setCurvePoints \u52a8\u6001\u66f4\u65b0\"\n\n    - name: \"ctx.createPolygon\"\n      category: \"\u5f62\u72b6\"\n      signature: \"ctx.createPolygon(points: [number, number][], fillColor, strokeWidth?, strokeColor?): ShapeId\"\n      description: \"\u521b\u5efa\u591a\u8fb9\u5f62\"\n      parameters:\n        - name: \"points\"\n          type: \"Array<[number, number]>\"\n          description: \"\u9876\u70b9\u5750\u6807\u6570\u7ec4\"\n        - name: \"fillColor\"\n          type: \"string\"\n          description: \"\u586b\u5145\u989c\u8272\"\n        - name: \"strokeWidth\"\n          type: \"number\"\n          optional: true\n          description: \"\u63cf\u8fb9\u5bbd\u5ea6\"\n        - name: \"strokeColor\"\n          type: \"string\"\n          optional: true\n          description: \"\u63cf\u8fb9\u989c\u8272\"\n      returns: \"ShapeId\"\n      example: |\n        // \u7bad\u5934\u5934\u90e8\uff08\u4e09\u89d2\u5f62\uff09\n        const arrow = ctx.createPolygon([\n          [endX, endY],\n          [endX - 12, endY - 6],\n          [endX - 12, endY + 6]\n        ], '#F59E0B', 0);\n\n        // \u516d\u8fb9\u5f62\n        const points = [];\n        for (let i = 0; i < 6; i++) {\n          const angle = (i / 6) * Math.PI * 2;\n          points.push([\n            centerX + Math.cos(angle) * 50,\n            centerY + Math.sin(angle) * 50\n          ]);\n        }\n        const hexagon = ctx.createPolygon(points, '#10B981', 2, '#064E3B');\n      use_cases:\n        - \"\u7bad\u5934\u5934\u90e8\"\n        - \"\u6b63\u591a\u8fb9\u5f62\u3001\u6676\u4f53\"\n        - \"\u4e0d\u89c4\u5219\u5f62\u72b6\"\n      best_practices:\n        - \"6-12\u4e2a\u9876\u70b9\u4e3a\u5b9c\"\n        - \"\u987a\u65f6\u9488\u6216\u9006\u65f6\u9488\u987a\u5e8f\u5747\u53ef\"\n\n    - name: \"ctx.createText\"\n      category: \"\u6587\u672c\"\n      signature: \"ctx.createText(text, x, y, options?): TextId\"\n      description: \"\u521b\u5efa\u6587\u672c\"\n      parameters:\n        - name: \"text\"\n          type: \"string\"\n          description: \"\u6587\u672c\u5185\u5bb9\"\n        - name: \"x, y\"\n          type: \"number\"\n          description: \"\u6587\u672c\u4f4d\u7f6e\"\n        - name: \"options\"\n          type: \"object\"\n          optional: true\n          description: \"\u6587\u672c\u6837\u5f0f\u9009\u9879\"\n          properties:\n            - name: \"fontSize\"\n              type: \"number\"\n              default: 14\n              description: \"\u5b57\u4f53\u5927\u5c0f\uff0812-24px\uff09\"\n            - name: \"color\"\n              type: \"string\"\n              default: \"#000000\"\n              description: \"\u6587\u672c\u989c\u8272\"\n            - name: \"align\"\n              type: \"string\"\n              default: \"left\"\n              options: [\"left\", \"center\", \"right\"]\n              description: \"\u6587\u672c\u5bf9\u9f50\u65b9\u5f0f\"\n            - name: \"fontWeight\"\n              type: \"string\"\n              default: \"normal\"\n              options: [\"normal\", \"bold\"]\n              description: \"\u5b57\u4f53\u7c97\u7ec6\"\n      returns: \"TextId\"\n      example: |\n        // \u6807\u9898\n        const title = ctx.createText(\n          '\u6469\u64e6\u529b\u6a21\u62df',\n          width * 0.5, 30,\n          {fontSize: 20, color: '#1E293B', align: 'center', fontWeight: 'bold'}\n        );\n\n        // \u6570\u503c\u6807\u7b7e\n        const label = ctx.createText(\n          `v = ${velocity.toFixed(1)} m/s`,\n          x + 20, y,\n          {fontSize: 14, color: '#3B82F6'}\n        );\n      use_cases:\n        - \"\u6807\u9898\u3001\u6807\u7b7e\"\n        - \"\u6570\u503c\u663e\u793a\"\n        - \"\u56fe\u4f8b\u8bf4\u660e\"\n      best_practices:\n        - \"\u5b57\u4f53\u5927\u5c0f 12-20px\uff0c\u6807\u9898 18-24px\"\n        - \"\u5bf9\u6bd4\u5ea6 >= 4.5:1\"\n        - \"\u4f7f\u7528 align: 'center' \u5c45\u4e2d\u5bf9\u9f50\"\n\n  # ==== \u5c5e\u6027\u4fee\u6539 API ====\n  modifications:\n    - name: \"ctx.setPosition\"\n      category: \"\u4f4d\u7f6e\u53d8\u6362\"\n      signature: \"ctx.setPosition(shapeId, x, y): void\"\n      description: \"\u8bbe\u7f6e\u5f62\u72b6\u4f4d\u7f6e\"\n      parameters:\n        - name: \"shapeId\"\n          type: \"ShapeId\"\n          description: \"\u5f62\u72b6ID\"\n        - name: \"x, y\"\n          type: \"number\"\n          description: \"\u65b0\u7684\u4f4d\u7f6e\u5750\u6807\"\n      example: |\n        const ball = ctx.createCircle(0, 0, 20, '#3B82F6', 0);\n        const t = ctx.getTime() * 0.001;\n        const x = width * 0.5 + Math.sin(t) * 100;\n        ctx.setPosition(ball, x, height * 0.5);\n      use_cases:\n        - \"\u4f4d\u7f6e\u52a8\u753b\"\n        - \"\u79fb\u52a8\u7269\u4f53\"\n      best_practices:\n        - \"\u52a8\u6001\u4f4d\u7f6e\u5fc5\u987b\u4f7f\u7528 clamp \u9650\u5236\"\n\n    - name: \"ctx.setColor\"\n      category: \"\u989c\u8272\u53d8\u6362\"\n      signature: \"ctx.setColor(shapeId, fillColor, strokeColor?): void\"\n      description: \"\u8bbe\u7f6e\u5f62\u72b6\u989c\u8272\"\n      parameters:\n        - name: \"shapeId\"\n          type: \"ShapeId\"\n          description: \"\u5f62\u72b6ID\"\n        - name: \"fillColor\"\n          type: \"string\"\n          description: \"\u65b0\u7684\u586b\u5145\u989c\u8272\"\n        - name: \"strokeColor\"\n          type: \"string\"\n          optional: true\n          description: \"\u65b0\u7684\u63cf\u8fb9\u989c\u8272\"\n      example: |\n        const box = ctx.createRect(x, y, 50, 50, '#6B7280', 4);\n        const temp = ctx.getVar('temperature');\n        const color = temp > 50 ? '#EF4444' : '#3B82F6';\n        ctx.setColor(box, color);\n      use_cases:\n        - \"\u72b6\u6001\u53d8\u5316\"\n        - \"\u6e29\u5ea6\u6620\u5c04\"\n        - \"\u9ad8\u4eae\u63d0\u793a\"\n\n    - name: \"ctx.setAlpha\"\n      category: \"\u989c\u8272\u53d8\u6362\"\n      signature: \"ctx.setAlpha(shapeId, alpha): void\"\n      description: \"\u8bbe\u7f6e\u5f62\u72b6\u900f\u660e\u5ea6\"\n      parameters:\n        - name: \"shapeId\"\n          type: \"ShapeId\"\n          description: \"\u5f62\u72b6ID\"\n        - name: \"alpha\"\n          type: \"number\"\n          description: \"\u900f\u660e\u5ea6\uff080.0-1.0\uff09\"\n      example: |\n        const fadeAlpha = Math.abs(Math.sin(ctx.getTime() * 0.002));\n        ctx.setAlpha(ghost, fadeAlpha);\n      use_cases:\n        - \"\u6de1\u5165\u6de1\u51fa\"\n        - \"\u95ea\u70c1\u6548\u679c\"\n\n    - name: \"ctx.setScale\"\n      category: \"\u4f4d\u7f6e\u53d8\u6362\"\n      signature: \"ctx.setScale(shapeId, scaleX, scaleY?): void\"\n      description: \"\u8bbe\u7f6e\u5f62\u72b6\u7f29\u653e\"\n      parameters:\n        - name: \"shapeId\"\n          type: \"ShapeId\"\n          description: \"\u5f62\u72b6ID\"\n        - name: \"scaleX\"\n          type: \"number\"\n          description: \"X\u8f74\u7f29\u653e\u6bd4\u4f8b\"\n        - name: \"scaleY\"\n          type: \"number\"\n          optional: true\n          description: \"Y\u8f74\u7f29\u653e\u6bd4\u4f8b\uff08\u9ed8\u8ba4\u4e0escaleX\u76f8\u540c\uff09\"\n      example: |\n        const pulse = 1 + Math.sin(ctx.getTime() * 0.003) * 0.2;\n        ctx.setScale(heart, pulse);\n      use_cases:\n        - \"\u8109\u52a8\u6548\u679c\"\n        - \"\u5f3a\u8c03\u52a8\u753b\"\n\n    - name: \"ctx.setRotation\"\n      category: \"\u4f4d\u7f6e\u53d8\u6362\"\n      signature: \"ctx.setRotation(shapeId, angle): void\"\n      description: \"\u8bbe\u7f6e\u5f62\u72b6\u65cb\u8f6c\u89d2\u5ea6\"\n      parameters:\n        - name: \"shapeId\"\n          type: \"ShapeId\"\n          description: \"\u5f62\u72b6ID\"\n        - name: \"angle\"\n          type: \"number\"\n          description: \"\u65cb\u8f6c\u89d2\u5ea6\uff08\u5f27\u5ea6\uff09\"\n      example: |\n        const spinner = ctx.createRect(x, y, 40, 40, '#8B5CF6', 4);\n        const rotation = ctx.getTime() * 0.002;\n        ctx.setRotation(spinner, rotation);\n      use_cases:\n        - \"\u65cb\u8f6c\u52a8\u753b\"\n        - \"\u89d2\u5ea6\u53d8\u5316\"\n\n    - name: \"ctx.setGlow\"\n      category: \"\u7279\u6548\"\n      signature: \"ctx.setGlow(shapeId, options): void\"\n      description: \"\u8bbe\u7f6e\u53d1\u5149\u6548\u679c\"\n      parameters:\n        - name: \"shapeId\"\n          type: \"ShapeId\"\n          description: \"\u5f62\u72b6ID\"\n        - name: \"options\"\n          type: \"object\"\n          properties:\n            - name: \"color\"\n              type: \"string\"\n              description: \"\u53d1\u5149\u989c\u8272\"\n            - name: \"blur\"\n              type: \"number\"\n              description: \"\u6a21\u7cca\u534a\u5f84\uff085-15px\uff09\"\n      example: |\n        const star = ctx.createCircle(x, y, 15, '#FBBF24', 0);\n        ctx.setGlow(star, {color: '#FBBF24', blur: 12});\n      use_cases:\n        - \"\u80fd\u91cf\u72b6\u6001\"\n        - \"\u9ad8\u4eae\u5143\u7d20\"\n        - \"\u6fc0\u6d3b\u72b6\u6001\"\n      best_practices:\n        - \"blur \u8303\u56f4 5-15\"\n        - \"\u53d1\u5149\u989c\u8272\u4e0e\u5143\u7d20\u989c\u8272\u4e00\u81f4\"\n\n    - name: \"ctx.setRadius\"\n      category: \"\u5c3a\u5bf8\u53d8\u6362\"\n      signature: \"ctx.setRadius(circleId, radius): void\"\n      description: \"\u8bbe\u7f6e\u5706\u5f62\u534a\u5f84\"\n      parameters:\n        - name: \"circleId\"\n          type: \"ShapeId\"\n          description: \"\u5706\u5f62ID\"\n        - name: \"radius\"\n          type: \"number\"\n          description: \"\u65b0\u7684\u534a\u5f84\"\n      example: |\n        const bubble = ctx.createCircle(x, y, 10, '#3B82F6', 0);\n        const size = 10 + ctx.getVar('pressure') * 5;\n        ctx.setRadius(bubble, size);\n      use_cases:\n        - \"\u5927\u5c0f\u52a8\u753b\"\n        - \"\u6570\u503c\u6620\u5c04\"\n\n    - name: \"ctx.setSize\"\n      category: \"\u5c3a\u5bf8\u53d8\u6362\"\n      signature: \"ctx.setSize(rectId, width, height): void\"\n      description: \"\u8bbe\u7f6e\u77e9\u5f62\u5c3a\u5bf8\"\n      parameters:\n        - name: \"rectId\"\n          type: \"ShapeId\"\n          description: \"\u77e9\u5f62ID\"\n        - name: \"width\"\n          type: \"number\"\n          description: \"\u65b0\u7684\u5bbd\u5ea6\"\n        - name: \"height\"\n          type: \"number\"\n          description: \"\u65b0\u7684\u9ad8\u5ea6\"\n      example: |\n        const bar = ctx.createRect(x, y, 50, 0, '#10B981', 4);\n        const barHeight = ctx.getVar('value') * 2;\n        ctx.setSize(bar, 50, barHeight);\n      use_cases:\n        - \"\u67f1\u72b6\u56fe\u52a8\u753b\"\n        - \"\u8fdb\u5ea6\u6761\"\n\n    - name: \"ctx.setCurvePoints\"\n      category: \"\u66f2\u7ebf\u53d8\u6362\"\n      signature: \"ctx.setCurvePoints(curveId, points): void\"\n      description: \"\u66f4\u65b0\u66f2\u7ebf\u70b9\u96c6\"\n      parameters:\n        - name: \"curveId\"\n          type: \"ShapeId\"\n          description: \"\u66f2\u7ebfID\"\n        - name: \"points\"\n          type: \"Array<[number, number]>\"\n          description: \"\u65b0\u7684\u70b9\u5750\u6807\u6570\u7ec4\"\n      example: |\n        const curve = ctx.createCurve([], '#1E40AF', 2);\n        const newPoints = [];\n        const freq = ctx.getVar('frequency');\n        for (let i = 0; i <= 100; i++) {\n          const t = (i / 100) * Math.PI * 2;\n          const x = width * 0.1 + (i / 100) * width * 0.8;\n          const y = height * 0.5 + Math.sin(t * freq) * 60;\n          newPoints.push([x, y]);\n        }\n        ctx.setCurvePoints(curve, newPoints);\n      use_cases:\n        - \"\u52a8\u6001\u66f2\u7ebf\"\n        - \"\u5b9e\u65f6\u6570\u636e\"\n\n  # ==== \u5de5\u5177 API ====\n  utilities:\n    - name: \"ctx.math.clamp\"\n      category: \"\u6570\u5b66\u5de5\u5177\"\n      signature: \"ctx.math.clamp(value, min, max): number\"\n      description: \"\u9650\u5236\u6570\u503c\u5728\u6307\u5b9a\u8303\u56f4\u5185\"\n      parameters:\n        - name: \"value\"\n          type: \"number\"\n          description: \"\u8981\u9650\u5236\u7684\u503c\"\n        - name: \"min\"\n          type: \"number\"\n          description: \"\u6700\u5c0f\u503c\"\n        - name: \"max\"\n          type: \"number\"\n          description: \"\u6700\u5927\u503c\"\n      returns: \"\u9650\u5236\u540e\u7684\u6570\u503c\"\n      example: |\n        const rawX = width * 0.5 + velocity * t;\n        const safeX = ctx.math.clamp(rawX, width * 0.1, width * 0.9);\n      use_cases:\n        - \"\u8fb9\u754c\u9650\u5236\"\n        - \"\u9632\u6b62\u8d8a\u754c\"\n      important: \"\u52a8\u6001\u5750\u6807\u5fc5\u987b\u4f7f\u7528\"\n\n    - name: \"ctx.math.lerp\"\n      category: \"\u6570\u5b66\u5de5\u5177\"\n      signature: \"ctx.math.lerp(start, end, t): number\"\n      description: \"\u7ebf\u6027\u63d2\u503c\"\n      parameters:\n        - name: \"start\"\n          type: \"number\"\n          description: \"\u8d77\u59cb\u503c\"\n        - name: \"end\"\n          type: \"number\"\n          description: \"\u7ed3\u675f\u503c\"\n        - name: \"t\"\n          type: \"number\"\n          description: \"\u63d2\u503c\u53c2\u6570 (0-1)\"\n      returns: \"\u63d2\u503c\u7ed3\u679c\"\n      example: |\n        const progress = (ctx.getTime() % 2000) / 2000;\n        const x = ctx.math.lerp(width * 0.2, width * 0.8, progress);\n      use_cases:\n        - \"\u5e73\u6ed1\u52a8\u753b\"\n        - \"\u989c\u8272\u6e10\u53d8\"\n\n    - name: \"ctx.math.map\"\n      category: \"\u6570\u5b66\u5de5\u5177\"\n      signature: \"ctx.math.map(value, inMin, inMax, outMin, outMax): number\"\n      description: \"\u5c06\u6570\u503c\u4ece\u4e00\u4e2a\u8303\u56f4\u6620\u5c04\u5230\u53e6\u4e00\u4e2a\u8303\u56f4\"\n      parameters:\n        - name: \"value\"\n          type: \"number\"\n          description: \"\u8f93\u5165\u503c\"\n        - name: \"inMin, inMax\"\n          type: \"number\"\n          description: \"\u8f93\u5165\u8303\u56f4\"\n        - name: \"outMin, outMax\"\n          type: \"number\"\n          description: \"\u8f93\u51fa\u8303\u56f4\"\n      returns: \"\u6620\u5c04\u540e\u7684\u6570\u503c\"\n      example: |\n        const temp = ctx.getVar('temperature');  // 0-100\n        const color = ctx.math.map(temp, 0, 100, 0, 255);\n      use_cases:\n        - \"\u6570\u636e\u6620\u5c04\"\n        - \"\u8303\u56f4\u8f6c\u6362\"\n\n  # ==== \u9ad8\u7ea7 API ====\n  advanced:\n    - name: \"ctx.addVariable\"\n      category: \"\u53d8\u91cf\u7ba1\u7406\"\n      signature: \"ctx.addVariable(name, defaultValue, min, max, label?): void\"\n      description: \"\u6dfb\u52a0\u6ed1\u5757\u53d8\u91cf\uff08\u4ec5\u5728 setup \u4e2d\u4f7f\u7528\uff09\"\n      parameters:\n        - name: \"name\"\n          type: \"string\"\n          description: \"\u53d8\u91cf\u540d\u79f0\uff08camelCase\uff09\"\n        - name: \"defaultValue\"\n          type: \"number\"\n          description: \"\u9ed8\u8ba4\u503c\"\n        - name: \"min\"\n          type: \"number\"\n          description: \"\u6700\u5c0f\u503c\"\n        - name: \"max\"\n          type: \"number\"\n          description: \"\u6700\u5927\u503c\"\n        - name: \"label\"\n          type: \"string\"\n          optional: true\n          description: \"\u663e\u793a\u6807\u7b7e\uff08\u4e2d\u6587\uff09\"\n      example: |\n        function setup(ctx) {\n          ctx.addVariable('mass', 5, 1, 10, '\u8d28\u91cf (kg)');\n          ctx.addVariable('velocity', 3, 0, 10, '\u901f\u5ea6 (m/s)');\n        }\n      important: \"\u5fc5\u987b\u5728 setup \u51fd\u6570\u4e2d\u8c03\u7528\"\n\n# \u5e38\u89c1\u9519\u8bef\ncommon_mistakes:\n  - mistake: \"\u4f7f\u7528\u4e0d\u5b58\u5728\u7684 API\"\n    examples:\n      - \"ctx.createArc()  // \u4e0d\u5b58\u5728\uff0c\u5e94\u4f7f\u7528 createCircle\"\n      - \"ctx.createPath() // \u4e0d\u5b58\u5728\uff0c\u5e94\u4f7f\u7528 createCurve \u6216 createPolygon\"\n    fix: \"\u4ec5\u4f7f\u7528\u6587\u6863\u4e2d\u5217\u51fa\u7684 API\"\n\n  - mistake: \"\u786c\u7f16\u7801\u5750\u6807\"\n    example: \"const x = 500;  // \u9519\u8bef\"\n    fix: \"const x = width * 0.5;  // \u6b63\u786e\"\n\n  - mistake: \"\u672a\u9650\u5236\u8fb9\u754c\"\n    example: \"const x = centerX + velocity * t;  // \u53ef\u80fd\u8d8a\u754c\"\n    fix: \"const x = ctx.math.clamp(centerX + velocity * t, width*0.1, width*0.9);\"\n\n  - mistake: \"\u4f7f\u7528\u7981\u6b62\u7684\u989c\u8272\"\n    examples:\n      - \"'#000000'  // \u7eaf\u9ed1\u8272\uff0c\u4e0e\u80cc\u666f\u878d\u5408\"\n      - \"'#1E293B' // \u6df1\u7070\u8272\uff0c\u4e0e\u80cc\u666f\u878d\u5408\"\n    fix: \"\u4f7f\u7528\u4eae\u8272\u7cfb\uff0c\u5bf9\u6bd4\u5ea6 >= 4.5:1\"\n\n  - mistake: \"\u66f2\u7ebf\u91c7\u6837\u70b9\u592a\u5c11\"\n    example: \"for (let i = 0; i < 10; i++)  // \u53ea\u670910\u4e2a\u70b9\u4e0d\u5e73\u6ed1\"\n    fix: \"for (let i = 0; i <= 50; i++)  // \u81f3\u5c1130\u4e2a\u70b9\"\n\n# API \u4f7f\u7528\u6700\u4f73\u5b9e\u8df5\nbest_practices:\n  structure:\n    - \"\u5fc5\u987b\u5b9a\u4e49 setup \u548c update \u51fd\u6570\"\n    - \"setup \u4e2d\u6dfb\u52a0\u53d8\u91cf\uff0cupdate \u4e2d\u7ed8\u5236\"\n    - \"\u4f7f\u75282-3\u4e2a\u8f85\u52a9\u51fd\u6570\u589e\u5f3a\u53ef\u8bfb\u6027\"\n\n  coordinates:\n    - \"\u5fc5\u987b\u4f7f\u7528\u6bd4\u4f8b\u5750\u6807\uff1awidth * 0.5\"\n    - \"\u52a8\u6001\u5750\u6807\u5fc5\u987b clamp \u9650\u5236\"\n    - \"\u5b89\u5168\u533a\u57df\uff1ax \u2208 [0.1, 0.95], y \u2208 [60, height-40]\"\n\n  colors:\n    - \"\u989c\u8272\u5fc5\u987b\u6709\u8bed\u4e49\"\n    - \"\u5bf9\u6bd4\u5ea6 >= 4.5:1\"\n    - \"\u7981\u7528\u7eaf\u9ed1 #000000 \u548c\u6df1\u7070 #1E293B\"\n\n  animation:\n    - \"\u4f7f\u7528 ctx.getTime() \u5b9e\u73b0\u65f6\u95f4\u52a8\u753b\"\n    - \"\u4f7f\u7528\u7f13\u52a8\u51fd\u6570\u5e73\u6ed1\u8fc7\u6e21\"\n    - \"\u53d1\u5149\u6548\u679c\u589e\u5f3a\u89c6\u89c9\u51b2\u51fb\"\n\n  performance:\n    - \"\u907f\u514d\u8fc7\u591a\u5f62\u72b6\uff08<200\u4e2a\uff09\"\n    - \"\u66f2\u7ebf\u91c7\u6837 30-100 \u4e2a\u70b9\"\n    - \"\u4e0d\u8981\u5728\u5faa\u73af\u4e2d\u521b\u5efa\u5f62\u72b6\"\n\n# \u5feb\u901f\u67e5\u9605\u8868\nquick_reference:\n  shapes:\n    - \"createCircle(x, y, r, fill, stroke?, strokeColor?)\"\n    - \"createRect(x, y, w, h, fill, corner?, stroke?, strokeColor?)\"\n    - \"createLine(x1, y1, x2, y2, color, width)\"\n    - \"createCurve(points[], color, width)\"\n    - \"createPolygon(points[], fill, stroke?, strokeColor?)\"\n    - \"createText(text, x, y, {fontSize, color, align, fontWeight})\"\n\n  modifications:\n    - \"setPosition(id, x, y)\"\n    - \"setColor(id, fill, stroke?)\"\n    - \"setAlpha(id, alpha)\"\n    - \"setScale(id, scaleX, scaleY?)\"\n    - \"setRotation(id, angle)\"\n    - \"setGlow(id, {color, blur})\"\n    - \"setRadius(id, radius)\"\n    - \"setSize(id, width, height)\"\n    - \"setCurvePoints(id, points[])\"\n\n  utilities:\n    - \"getTime() -> number\"\n    - \"getVar(name) -> number\"\n    - \"setVar(name, value)\"\n    - \"math.clamp(value, min, max) -> number\"\n    - \"math.lerp(start, end, t) -> number\"\n    - \"math.map(value, inMin, inMax, outMin, outMax) -> number\"\n\n# \u4ee3\u7801\u6a21\u677f\ncode_templates:\n  basic_structure: |\n    function setup(ctx) {\n      ctx.addVariable('param1', 5, 1, 10, '\u53c2\u65701');\n      ctx.addVariable('param2', 3, 0, 10, '\u53c2\u65702');\n    }\n\n    function update(ctx, width, height) {\n      // \u83b7\u53d6\u53d8\u91cf\n      const value1 = ctx.getVar('param1');\n      const value2 = ctx.getVar('param2');\n\n      // \u7ed8\u5236\u5143\u7d20\n      drawMainVisualization(ctx, width, height, value1, value2);\n      drawLabels(ctx, width, height, value1, value2);\n    }\n\n    function drawMainVisualization(ctx, width, height, v1, v2) {\n      // \u4e3b\u8981\u89c6\u89c9\u5316\u903b\u8f91\n    }\n\n    function drawLabels(ctx, width, height, v1, v2) {\n      // \u6807\u7b7e\u548c\u6587\u672c\n    }\n\n  animation_template: |\n    const t = ctx.getTime() * 0.001;  // \u65f6\u95f4\uff08\u79d2\uff09\n    const progress = (t % 3) / 3;      // 3\u79d2\u5faa\u73af\n\n    // \u4f4d\u7f6e\u52a8\u753b\n    const x = ctx.math.lerp(\n      width * 0.2,\n      width * 0.8,\n      progress\n    );\n\n    // \u5468\u671f\u52a8\u753b\n    const y = height * 0.5 + Math.sin(t * 2) * 50;\n\n  safe_coordinate_template: |\n    // \u4f7f\u7528\u6bd4\u4f8b\u5750\u6807\n    const centerX = width * 0.5;\n    const centerY = height * 0.5;\n\n    // \u52a8\u6001\u5750\u6807\u5fc5\u987b clamp\n    const dynamicX = centerX + offset;\n    const safeX = ctx.math.clamp(\n      dynamicX,\n      width * 0.1,\n      width * 0.95\n    );\n", "type": "text"}]