# HERCU CustomRenderer API 完整文档
# 版本: 1.0.0
# 更新: 2026-02-10

version: "v3"

# CustomRenderer API 完整参考
api_reference:
  # ==== 基础 API ====
  basic:
    - name: "ctx.getTime"
      category: "时间和状态"
      signature: "ctx.getTime(): number"
      description: "获取当前时间戳（毫秒），用于动画"
      returns: "返回从程序启动到现在的毫秒数"
      example: |
        const t = ctx.getTime() * 0.001;  // 转换为秒
        const x = width * 0.5 + Math.sin(t) * 100;
      use_cases:
        - "周期性动画"
        - "时间相关效果"
        - "自动播放"
      notes:
        - "建议乘以 0.001 转换为秒"
        - "可用 % 运算符实现循环： t % 3000"

    - name: "ctx.getVar"
      category: "变量访问"
      signature: "ctx.getVar(name: string): number"
      description: "获取滑块变量的当前值"
      parameters:
        - name: "name"
          type: "string"
          description: "变量名称（必须在 setup 中定义）"
      returns: "变量的当前数值"
      example: |
        // 在 setup 中定义
        ctx.addVariable('mass', 5, 1, 10);

        // 在 update 中使用
        const mass = ctx.getVar('mass');
        const radius = mass * 10;
      use_cases:
        - "获取用户输入"
        - "根据变量调整视觉"
        - "计算依赖参数"
      important: "变量必须影响视觉，不能只是装饰"

    - name: "ctx.setVar"
      category: "变量访问"
      signature: "ctx.setVar(name: string, value: number): void"
      description: "设置变量的值（程序内部使用）"
      parameters:
        - name: "name"
          type: "string"
          description: "变量名称"
        - name: "value"
          type: "number"
          description: "新的数值"
      example: |
        // 自动更新变量
        const time = ctx.getTime() * 0.001;
        ctx.setVar('currentTime', time % 10);
      use_cases:
        - "内部状态管理"
        - "计算结果存储"
      notes:
        - "不影响用户滑块控制"

  # ==== 形状创建 API ====
  shapes:
    - name: "ctx.createCircle"
      category: "形状"
      signature: "ctx.createCircle(x, y, radius, fillColor, strokeWidth?, strokeColor?): ShapeId"
      description: "创建圆形"
      parameters:
        - name: "x"
          type: "number"
          description: "X坐标（推荐使用比例：width * 0.5）"
        - name: "y"
          type: "number"
          description: "Y坐标"
        - name: "radius"
          type: "number"
          description: "半径（像素）"
        - name: "fillColor"
          type: "string"
          description: "填充颜色（#RRGGBB 或 transparent）"
        - name: "strokeWidth"
          type: "number"
          optional: true
          description: "描边宽度（默认0）"
        - name: "strokeColor"
          type: "string"
          optional: true
          description: "描边颜色（默认#000000）"
      returns: "ShapeId - 形状ID，用于后续修改"
      example: |
        // 实心圆
        const ball = ctx.createCircle(
          width * 0.5, height * 0.5,
          30, '#3B82F6', 0
        );

        // 带描边的空心圆
        const orbit = ctx.createCircle(
          width * 0.5, height * 0.5,
          80, 'transparent', 2, '#6B7280'
        );
      use_cases:
        - "粒子、原子、行星"
        - "节点、数据点"
        - "按钮、指示器"
      best_practices:
        - "使用 transparent 创建空心圆"
        - "半径建议 8-50px"
        - "避免过小（<5px）或过大（>100px）"

    - name: "ctx.createRect"
      category: "形状"
      signature: "ctx.createRect(x, y, width, height, fillColor, cornerRadius?, strokeWidth?, strokeColor?): ShapeId"
      description: "创建矩形"
      parameters:
        - name: "x"
          type: "number"
          description: "左上X坐标"
        - name: "y"
          type: "number"
          description: "左上Y坐标"
        - name: "width"
          type: "number"
          description: "宽度"
        - name: "height"
          type: "number"
          description: "高度"
        - name: "fillColor"
          type: "string"
          description: "填充颜色"
        - name: "cornerRadius"
          type: "number"
          optional: true
          description: "圆角半径（默认0，建议4-8）"
        - name: "strokeWidth"
          type: "number"
          optional: true
          description: "描边宽度"
        - name: "strokeColor"
          type: "string"
          optional: true
          description: "描边颜色"
      returns: "ShapeId"
      example: |
        // 柱状图柱
        const bar = ctx.createRect(
          width * 0.3, height * 0.5,
          60, 120,
          '#10B981', 4
        );

        // 状态面板背景
        const panel = ctx.createRect(
          width * 0.7, height * 0.1,
          200, 80,
          'rgba(0,0,0,0.05)', 8, 2, '#D1D5DB'
        );
      use_cases:
        - "柱状图、条形图"
        - "按钮、面板背景"
        - "容器、边界框"
      best_practices:
        - "必须使用圆角 cornerRadius = 4-8"
        - "避免直角矩形（视觉生硬）"

    - name: "ctx.createLine"
      category: "形状"
      signature: "ctx.createLine(x1, y1, x2, y2, color, lineWidth): ShapeId"
      description: "创建直线"
      parameters:
        - name: "x1, y1"
          type: "number"
          description: "起点坐标"
        - name: "x2, y2"
          type: "number"
          description: "终点坐标"
        - name: "color"
          type: "string"
          description: "线条颜色"
        - name: "lineWidth"
          type: "number"
          description: "线宽（1-6px）"
      returns: "ShapeId"
      example: |
        // 坐标轴
        const xAxis = ctx.createLine(
          width * 0.1, height * 0.8,
          width * 0.9, height * 0.8,
          '#6B7280', 2
        );

        // 连接线
        const connection = ctx.createLine(
          x1, y1, x2, y2,
          '#3B82F6', 3
        );
      use_cases:
        - "坐标轴"
        - "连接线、关系线"
        - "力矢量的主体"
      notes:
        - "箭头需要用 createPolygon 额外绘制"
        - "虚线用多段短线模拟"

    - name: "ctx.createCurve"
      category: "形状"
      signature: "ctx.createCurve(points: [number, number][], color, lineWidth): ShapeId"
      description: "创建曲线（通过点集）"
      parameters:
        - name: "points"
          type: "Array<[number, number]>"
          description: "点坐标数组 [[x1,y1], [x2,y2], ...]"
        - name: "color"
          type: "string"
          description: "曲线颜色"
        - name: "lineWidth"
          type: "number"
          description: "线宽"
      returns: "ShapeId"
      example: |
        // 正弦曲线
        const points = [];
        for (let i = 0; i <= 100; i++) {
          const t = (i / 100) * Math.PI * 2;
          const x = width * 0.1 + (i / 100) * width * 0.8;
          const y = height * 0.5 + Math.sin(t) * 80;
          points.push([x, y]);
        }
        const curve = ctx.createCurve(points, '#1E40AF', 3);
      use_cases:
        - "函数图像"
        - "运动轨迹"
        - "波形、振动"
      best_practices:
        - "至少30个点保证平滑"
        - "复杂曲线建议 50-100 个点"
        - "可用 setCurvePoints 动态更新"

    - name: "ctx.createPolygon"
      category: "形状"
      signature: "ctx.createPolygon(points: [number, number][], fillColor, strokeWidth?, strokeColor?): ShapeId"
      description: "创建多边形"
      parameters:
        - name: "points"
          type: "Array<[number, number]>"
          description: "顶点坐标数组"
        - name: "fillColor"
          type: "string"
          description: "填充颜色"
        - name: "strokeWidth"
          type: "number"
          optional: true
          description: "描边宽度"
        - name: "strokeColor"
          type: "string"
          optional: true
          description: "描边颜色"
      returns: "ShapeId"
      example: |
        // 箭头头部（三角形）
        const arrow = ctx.createPolygon([
          [endX, endY],
          [endX - 12, endY - 6],
          [endX - 12, endY + 6]
        ], '#F59E0B', 0);

        // 六边形
        const points = [];
        for (let i = 0; i < 6; i++) {
          const angle = (i / 6) * Math.PI * 2;
          points.push([
            centerX + Math.cos(angle) * 50,
            centerY + Math.sin(angle) * 50
          ]);
        }
        const hexagon = ctx.createPolygon(points, '#10B981', 2, '#064E3B');
      use_cases:
        - "箭头头部"
        - "正多边形、晶体"
        - "不规则形状"
      best_practices:
        - "6-12个顶点为宜"
        - "顺时针或逆时针顺序均可"

    - name: "ctx.createText"
      category: "文本"
      signature: "ctx.createText(text, x, y, options?): TextId"
      description: "创建文本"
      parameters:
        - name: "text"
          type: "string"
          description: "文本内容"
        - name: "x, y"
          type: "number"
          description: "文本位置"
        - name: "options"
          type: "object"
          optional: true
          description: "文本样式选项"
          properties:
            - name: "fontSize"
              type: "number"
              default: 14
              description: "字体大小（12-24px）"
            - name: "color"
              type: "string"
              default: "#000000"
              description: "文本颜色"
            - name: "align"
              type: "string"
              default: "left"
              options: ["left", "center", "right"]
              description: "文本对齐方式"
            - name: "fontWeight"
              type: "string"
              default: "normal"
              options: ["normal", "bold"]
              description: "字体粗细"
      returns: "TextId"
      example: |
        // 标题
        const title = ctx.createText(
          '摩擦力模拟',
          width * 0.5, 30,
          {fontSize: 20, color: '#1E293B', align: 'center', fontWeight: 'bold'}
        );

        // 数值标签
        const label = ctx.createText(
          `v = ${velocity.toFixed(1)} m/s`,
          x + 20, y,
          {fontSize: 14, color: '#3B82F6'}
        );
      use_cases:
        - "标题、标签"
        - "数值显示"
        - "图例说明"
      best_practices:
        - "字体大小 12-20px，标题 18-24px"
        - "对比度 >= 4.5:1"
        - "使用 align: 'center' 居中对齐"

  # ==== 属性修改 API ====
  modifications:
    - name: "ctx.setPosition"
      category: "位置变换"
      signature: "ctx.setPosition(shapeId, x, y): void"
      description: "设置形状位置"
      parameters:
        - name: "shapeId"
          type: "ShapeId"
          description: "形状ID"
        - name: "x, y"
          type: "number"
          description: "新的位置坐标"
      example: |
        const ball = ctx.createCircle(0, 0, 20, '#3B82F6', 0);
        const t = ctx.getTime() * 0.001;
        const x = width * 0.5 + Math.sin(t) * 100;
        ctx.setPosition(ball, x, height * 0.5);
      use_cases:
        - "位置动画"
        - "移动物体"
      best_practices:
        - "动态位置必须使用 clamp 限制"

    - name: "ctx.setColor"
      category: "颜色变换"
      signature: "ctx.setColor(shapeId, fillColor, strokeColor?): void"
      description: "设置形状颜色"
      parameters:
        - name: "shapeId"
          type: "ShapeId"
          description: "形状ID"
        - name: "fillColor"
          type: "string"
          description: "新的填充颜色"
        - name: "strokeColor"
          type: "string"
          optional: true
          description: "新的描边颜色"
      example: |
        const box = ctx.createRect(x, y, 50, 50, '#6B7280', 4);
        const temp = ctx.getVar('temperature');
        const color = temp > 50 ? '#EF4444' : '#3B82F6';
        ctx.setColor(box, color);
      use_cases:
        - "状态变化"
        - "温度映射"
        - "高亮提示"

    - name: "ctx.setAlpha"
      category: "颜色变换"
      signature: "ctx.setAlpha(shapeId, alpha): void"
      description: "设置形状透明度"
      parameters:
        - name: "shapeId"
          type: "ShapeId"
          description: "形状ID"
        - name: "alpha"
          type: "number"
          description: "透明度（0.0-1.0）"
      example: |
        const fadeAlpha = Math.abs(Math.sin(ctx.getTime() * 0.002));
        ctx.setAlpha(ghost, fadeAlpha);
      use_cases:
        - "淡入淡出"
        - "闪烁效果"

    - name: "ctx.setScale"
      category: "位置变换"
      signature: "ctx.setScale(shapeId, scaleX, scaleY?): void"
      description: "设置形状缩放"
      parameters:
        - name: "shapeId"
          type: "ShapeId"
          description: "形状ID"
        - name: "scaleX"
          type: "number"
          description: "X轴缩放比例"
        - name: "scaleY"
          type: "number"
          optional: true
          description: "Y轴缩放比例（默认与scaleX相同）"
      example: |
        const pulse = 1 + Math.sin(ctx.getTime() * 0.003) * 0.2;
        ctx.setScale(heart, pulse);
      use_cases:
        - "脉动效果"
        - "强调动画"

    - name: "ctx.setRotation"
      category: "位置变换"
      signature: "ctx.setRotation(shapeId, angle): void"
      description: "设置形状旋转角度"
      parameters:
        - name: "shapeId"
          type: "ShapeId"
          description: "形状ID"
        - name: "angle"
          type: "number"
          description: "旋转角度（弧度）"
      example: |
        const spinner = ctx.createRect(x, y, 40, 40, '#8B5CF6', 4);
        const rotation = ctx.getTime() * 0.002;
        ctx.setRotation(spinner, rotation);
      use_cases:
        - "旋转动画"
        - "角度变化"

    - name: "ctx.setGlow"
      category: "特效"
      signature: "ctx.setGlow(shapeId, options): void"
      description: "设置发光效果"
      parameters:
        - name: "shapeId"
          type: "ShapeId"
          description: "形状ID"
        - name: "options"
          type: "object"
          properties:
            - name: "color"
              type: "string"
              description: "发光颜色"
            - name: "blur"
              type: "number"
              description: "模糊半径（5-15px）"
      example: |
        const star = ctx.createCircle(x, y, 15, '#FBBF24', 0);
        ctx.setGlow(star, {color: '#FBBF24', blur: 12});
      use_cases:
        - "能量状态"
        - "高亮元素"
        - "激活状态"
      best_practices:
        - "blur 范围 5-15"
        - "发光颜色与元素颜色一致"

    - name: "ctx.setRadius"
      category: "尺寸变换"
      signature: "ctx.setRadius(circleId, radius): void"
      description: "设置圆形半径"
      parameters:
        - name: "circleId"
          type: "ShapeId"
          description: "圆形ID"
        - name: "radius"
          type: "number"
          description: "新的半径"
      example: |
        const bubble = ctx.createCircle(x, y, 10, '#3B82F6', 0);
        const size = 10 + ctx.getVar('pressure') * 5;
        ctx.setRadius(bubble, size);
      use_cases:
        - "大小动画"
        - "数值映射"

    - name: "ctx.setSize"
      category: "尺寸变换"
      signature: "ctx.setSize(rectId, width, height): void"
      description: "设置矩形尺寸"
      parameters:
        - name: "rectId"
          type: "ShapeId"
          description: "矩形ID"
        - name: "width"
          type: "number"
          description: "新的宽度"
        - name: "height"
          type: "number"
          description: "新的高度"
      example: |
        const bar = ctx.createRect(x, y, 50, 0, '#10B981', 4);
        const barHeight = ctx.getVar('value') * 2;
        ctx.setSize(bar, 50, barHeight);
      use_cases:
        - "柱状图动画"
        - "进度条"

    - name: "ctx.setCurvePoints"
      category: "曲线变换"
      signature: "ctx.setCurvePoints(curveId, points): void"
      description: "更新曲线点集"
      parameters:
        - name: "curveId"
          type: "ShapeId"
          description: "曲线ID"
        - name: "points"
          type: "Array<[number, number]>"
          description: "新的点坐标数组"
      example: |
        const curve = ctx.createCurve([], '#1E40AF', 2);
        const newPoints = [];
        const freq = ctx.getVar('frequency');
        for (let i = 0; i <= 100; i++) {
          const t = (i / 100) * Math.PI * 2;
          const x = width * 0.1 + (i / 100) * width * 0.8;
          const y = height * 0.5 + Math.sin(t * freq) * 60;
          newPoints.push([x, y]);
        }
        ctx.setCurvePoints(curve, newPoints);
      use_cases:
        - "动态曲线"
        - "实时数据"

  # ==== 工具 API ====
  utilities:
    - name: "ctx.math.clamp"
      category: "数学工具"
      signature: "ctx.math.clamp(value, min, max): number"
      description: "限制数值在指定范围内"
      parameters:
        - name: "value"
          type: "number"
          description: "要限制的值"
        - name: "min"
          type: "number"
          description: "最小值"
        - name: "max"
          type: "number"
          description: "最大值"
      returns: "限制后的数值"
      example: |
        const rawX = width * 0.5 + velocity * t;
        const safeX = ctx.math.clamp(rawX, width * 0.1, width * 0.9);
      use_cases:
        - "边界限制"
        - "防止越界"
      important: "动态坐标必须使用"

    - name: "ctx.math.lerp"
      category: "数学工具"
      signature: "ctx.math.lerp(start, end, t): number"
      description: "线性插值"
      parameters:
        - name: "start"
          type: "number"
          description: "起始值"
        - name: "end"
          type: "number"
          description: "结束值"
        - name: "t"
          type: "number"
          description: "插值参数 (0-1)"
      returns: "插值结果"
      example: |
        const progress = (ctx.getTime() % 2000) / 2000;
        const x = ctx.math.lerp(width * 0.2, width * 0.8, progress);
      use_cases:
        - "平滑动画"
        - "颜色渐变"

    - name: "ctx.math.map"
      category: "数学工具"
      signature: "ctx.math.map(value, inMin, inMax, outMin, outMax): number"
      description: "将数值从一个范围映射到另一个范围"
      parameters:
        - name: "value"
          type: "number"
          description: "输入值"
        - name: "inMin, inMax"
          type: "number"
          description: "输入范围"
        - name: "outMin, outMax"
          type: "number"
          description: "输出范围"
      returns: "映射后的数值"
      example: |
        const temp = ctx.getVar('temperature');  // 0-100
        const color = ctx.math.map(temp, 0, 100, 0, 255);
      use_cases:
        - "数据映射"
        - "范围转换"

  # ==== 高级 API ====
  advanced:
    - name: "ctx.addVariable"
      category: "变量管理"
      signature: "ctx.addVariable(name, defaultValue, min, max, label?): void"
      description: "添加滑块变量（仅在 setup 中使用）"
      parameters:
        - name: "name"
          type: "string"
          description: "变量名称（camelCase）"
        - name: "defaultValue"
          type: "number"
          description: "默认值"
        - name: "min"
          type: "number"
          description: "最小值"
        - name: "max"
          type: "number"
          description: "最大值"
        - name: "label"
          type: "string"
          optional: true
          description: "显示标签（中文）"
      example: |
        function setup(ctx) {
          ctx.addVariable('mass', 5, 1, 10, '质量 (kg)');
          ctx.addVariable('velocity', 3, 0, 10, '速度 (m/s)');
        }
      important: "必须在 setup 函数中调用"

# 常见错误
common_mistakes:
  - mistake: "使用不存在的 API"
    examples:
      - "ctx.createArc()  // 不存在，应使用 createCircle"
      - "ctx.createPath() // 不存在，应使用 createCurve 或 createPolygon"
    fix: "仅使用文档中列出的 API"

  - mistake: "硬编码坐标"
    example: "const x = 500;  // 错误"
    fix: "const x = width * 0.5;  // 正确"

  - mistake: "未限制边界"
    example: "const x = centerX + velocity * t;  // 可能越界"
    fix: "const x = ctx.math.clamp(centerX + velocity * t, width*0.1, width*0.9);"

  - mistake: "使用禁止的颜色"
    examples:
      - "'#000000'  // 纯黑色，与背景融合"
      - "'#1E293B' // 深灰色，与背景融合"
    fix: "使用亮色系，对比度 >= 4.5:1"

  - mistake: "曲线采样点太少"
    example: "for (let i = 0; i < 10; i++)  // 只有10个点不平滑"
    fix: "for (let i = 0; i <= 50; i++)  // 至少30个点"

# API 使用最佳实践
best_practices:
  structure:
    - "必须定义 setup 和 update 函数"
    - "setup 中添加变量，update 中绘制"
    - "使用2-3个辅助函数增强可读性"

  coordinates:
    - "必须使用比例坐标：width * 0.5"
